<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ModySOLE | Login</title>
  <meta name="description" content="Sign in to your ModySOLE account to track orders and save your 3D custom shoe designs.">
  <link rel="stylesheet" href="css/style.css?v=2">
  <link rel="stylesheet" href="css/login.css?v=2">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body>

  <div class="login-page">
    <div class="login-container">
      <a href="index.html" class="logo">Mody<span>SOLE</span></a>
      <h1>Welcome Back</h1>
      <p>Sign in to track your orders and save your 3D custom shoe designs.</p>
      
      <div class="login-form">
        <input type="email" id="login-email" placeholder="Email Address" class="login-input" value="user@modysole.com">
        <input type="password" id="login-password" placeholder="Password" class="login-input" value="user123">
        <button class="login-submit" onclick="handleLogin()">Login</button>
      </div>
      
      <div class="divider">
        <span>OR</span>
      </div>

      <button class="login-btn-option guest" onclick="loginAsGuest()">
        <i class="fas fa-user-circle"></i> Continue as Guest
      </button>
      
      <div class="test-creds">
        <!-- <small>Test Admin: admin@modysole.com / admin123</small><br> -->
        <small>Test User: user@modysole.com / user123</small>
      </div>
    </div>
  </div>

  <div id="toast"><span class="toast-icon"></span><span id="toast-msg"></span></div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/app.js?v=2"></script>
</body>
</html>
