<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ModySOLE | Login</title>
  <meta name="description" content="Sign in to your ModySOLE account to track orders and save your 3D custom shoe designs.">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/login.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body>

  <div class="login-page">
    <div class="login-container">
      <a href="index.html" class="logo">Mody<span>SOLE</span></a>
      <h1>Welcome Back</h1>
      <p>Sign in to track your orders and save your 3D custom shoe designs.</p>
      
      <div class="login-methods">
        <button class="login-btn-option google" onclick="loginWith('Google')">
          <i class="fab fa-google"></i> Continue with Google
        </button>
        <button class="login-btn-option apple" onclick="loginWith('Apple')">
          <i class="fab fa-apple"></i> Continue with Apple
        </button>
        <button class="login-btn-option email" onclick="loginWith('Email')">
          <i class="fas fa-envelope"></i> Continue with Email
        </button>
        <button class="login-btn-option mobile" onclick="loginWith('Mobile')">
          <i class="fas fa-mobile-alt"></i> Continue with Mobile OTP
        </button>
      </div>
      
      <a href="index.html" class="back-to-home">← Back to Home</a>
    </div>
  </div>

  <div id="toast"><span class="toast-icon"></span><span id="toast-msg"></span></div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/app.js"></script>
</body>
</html>
